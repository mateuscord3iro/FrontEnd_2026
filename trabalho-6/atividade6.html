<html>

        <style>
        body {
            transition: background-image 1s ease-in-out;
        }

        .estrelas {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            display: none;
        }

        .estrelas::after {
            content: "";
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            box-shadow:
                50px 100px white,
                150px 200px white,
                300px 50px white,
                400px 300px white,
                600px 150px white,
                800px 250px white,
                1000px 100px white;
            animation: piscar 2s infinite alternate;
        }

        @keyframes piscar {
            from { opacity: 0.2; }
            to { opacity: 1; }
        }
    </style>
    </head>
